<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dick-O-lympics</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; background:#0d0b14; overflow:hidden;
  font-family:'Arial Black', Arial, sans-serif;
}
canvas#bg { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; }
.ui {
  position:fixed; top:0; left:0; width:100%; height:100%;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:1;
  gap: 0;
}
.logo {
  text-align:center;
  margin-bottom: 32px;
  line-height:1.05;
}
.logo-top {
  font-size: clamp(14px, 4vw, 20px);
  color: rgba(255,220,80,0.75);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  text-shadow: 0 0 12px rgba(255,180,0,0.4);
  margin-bottom: 6px;
}
.logo-main {
  font-size: clamp(44px, 12vw, 88px);
  color: #ffd700;
  text-shadow:
    0 0 24px rgba(255,200,0,0.6),
    3px 3px 0 #7a4000,
    6px 6px 0 rgba(0,0,0,0.4);
  letter-spacing: 0.02em;
}
.logo-sub {
  font-size: clamp(13px, 3.2vw, 18px);
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.12em;
  margin-top: 8px;
}
.btn-row {
  display:flex; flex-direction:column;
  align-items:center;
  gap: 18px;
  width: min(380px, 88vw);
}
.game-btn {
  width: 100%;
  padding: 18px 24px;
  border: none; border-radius: 14px;
  cursor: pointer;
  display:flex; align-items:center; gap:16px;
  text-align:left;
  position:relative; overflow:hidden;
  transition: transform 0.1s, box-shadow 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.game-btn:active { transform: scale(0.97); }
.game-btn.blikkie {
  background: linear-gradient(135deg, #1a3a1a 0%, #0e2a0e 100%);
  box-shadow: 0 4px 24px rgba(0,180,0,0.25), inset 0 1px 0 rgba(255,255,255,0.08);
  border: 1.5px solid rgba(0,200,60,0.35);
}
.game-btn.scooter {
  background: linear-gradient(135deg, #2a1a0e 0%, #1a0e06 100%);
  box-shadow: 0 4px 24px rgba(220,120,0,0.25), inset 0 1px 0 rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,160,0,0.35);
}
.game-btn .icon {
  font-size: clamp(28px, 7vw, 40px);
  flex-shrink:0;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
}
.game-btn .info { flex:1; }
.game-btn .title {
  font-size: clamp(16px, 4.5vw, 22px);
  font-weight:900;
  line-height:1.1;
}
.game-btn.blikkie .title { color: #44ee66; }
.game-btn.scooter .title { color: #ffaa33; }
.game-btn .desc {
  font-size: clamp(10px, 2.6vw, 13px);
  color: rgba(255,255,255,0.5);
  margin-top:3px;
  font-family: Arial, sans-serif;
  font-weight:normal;
}
.game-btn .arrow {
  font-size: 20px;
  color: rgba(255,255,255,0.3);
  flex-shrink:0;
}
.version {
  position:fixed; bottom:14px; left:0; width:100%;
  text-align:center;
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  font-family: Arial, sans-serif;
  font-weight:normal;
  letter-spacing:0.06em;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="ui">
  <div class="logo">
    <div class="logo-top">🏅 welkom bij de</div>
    <div class="logo-main">Dick-O-lympics</div>
    <div class="logo-sub">de olympische spelen van Arnhem-Zuid</div>
  </div>

  <div class="btn-row">
    <button class="game-btn blikkie" onclick="openBlikkie()">
      <span class="icon">🍺</span>
      <div class="info">
        <div class="title">Blikkie Smijten</div>
        <div class="desc">Mik de klok op z'n bak</div>
      </div>
      <span class="arrow">▶</span>
    </button>

    <button class="game-btn scooter" onclick="openScooter()">
      <span class="icon">🛵</span>
      <div class="info">
        <div class="title">Stoter Scooter</div>
        <div class="desc">Bier en Beuken op de Arnhemse wegen</div>
      </div>
      <span class="arrow">▶</span>
    </button>
  </div>
</div>

<div class="version">Dick-O-lympics v1.0 · Arnhem 2026</div>

<script>
function openBlikkie() {
  // Existing Blikkie Smijten game
  window.location.href = 'klokopznbak.html';
}
function openScooter() {
  window.location.href = 'stoterscooter.html';
}

// ── Animated background ──────────────────────────────────────────────
const cv = document.getElementById('bg');
const cx = cv.getContext('2d');
let W, H, stars=[], t=0;

function resize() {
  W = cv.width  = window.innerWidth  * devicePixelRatio;
  H = cv.height = window.innerHeight * devicePixelRatio;
  cv.style.width  = window.innerWidth  + 'px';
  cv.style.height = window.innerHeight + 'px';
}
window.addEventListener('resize', resize);
resize();

// Generate stars
for (let i=0; i<120; i++) {
  stars.push({
    x: Math.random(), y: Math.random(),
    r: Math.random()*1.6+0.3,
    twinkle: Math.random()*Math.PI*2,
    speed: Math.random()*0.015+0.005
  });
}

function drawBg() {
  // Sky gradient
  const g = cx.createLinearGradient(0,0,0,H*0.65);
  g.addColorStop(0,   '#0a0818');
  g.addColorStop(0.35,'#150d28');
  g.addColorStop(0.65,'#2a1a0a');
  g.addColorStop(1,   '#3a1e08');
  cx.fillStyle=g; cx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s => {
    s.twinkle += s.speed;
    const alpha = 0.3 + Math.sin(s.twinkle)*0.4;
    cx.fillStyle = `rgba(255,240,200,${alpha})`;
    cx.beginPath();
    cx.arc(s.x*W, s.y*H*0.6, s.r*(devicePixelRatio||1), 0, Math.PI*2);
    cx.fill();
  });

  // Glow behind logo area
  const pulse = 0.8 + Math.sin(t*0.9)*0.2;
  const glow = cx.createRadialGradient(W/2, H*0.3, 0, W/2, H*0.3, W*0.55);
  glow.addColorStop(0,   `rgba(255,180,0,${0.07*pulse})`);
  glow.addColorStop(0.5, `rgba(180,80,0,${0.04*pulse})`);
  glow.addColorStop(1,   'transparent');
  cx.fillStyle=glow; cx.fillRect(0,0,W,H);

  // Ground / floor
  const floorG = cx.createLinearGradient(0,H*0.72,0,H);
  floorG.addColorStop(0,'#1a1420');
  floorG.addColorStop(1,'#0d0b14');
  cx.fillStyle=floorG; cx.fillRect(0,H*0.72,W,H*0.28);

  // Silhouette buildings
  const bldgs = [
    {x:0.02, w:0.10, h:0.28, win:[[0.2,0.1],[0.6,0.1],[0.2,0.4],[0.6,0.4],[0.2,0.7],[0.6,0.7]]},
    {x:0.13, w:0.07, h:0.22, win:[[0.3,0.15],[0.7,0.15],[0.3,0.5],[0.7,0.5]]},
    {x:0.20, w:0.12, h:0.32, win:[[0.2,0.1],[0.5,0.1],[0.8,0.1],[0.2,0.3],[0.5,0.3],[0.8,0.3],[0.2,0.55],[0.5,0.55],[0.8,0.55]]},
    {x:0.60, w:0.14, h:0.30, win:[[0.15,0.1],[0.5,0.1],[0.85,0.1],[0.15,0.35],[0.5,0.35],[0.85,0.35],[0.15,0.6],[0.5,0.6],[0.85,0.6]]},
    {x:0.75, w:0.08, h:0.20, win:[[0.25,0.2],[0.75,0.2],[0.25,0.55],[0.75,0.55]]},
    {x:0.84, w:0.11, h:0.26, win:[[0.2,0.12],[0.6,0.12],[0.2,0.4],[0.6,0.4],[0.2,0.68],[0.6,0.68]]},
    {x:0.92, w:0.08, h:0.18, win:[[0.3,0.2],[0.7,0.2],[0.3,0.6]]},
  ];

  const baseY = H*0.72;
  bldgs.forEach(b => {
    const bx=W*b.x, bw=W*b.w, bh=H*b.h;
    const by=baseY-bh;
    cx.fillStyle='#0e0c1a';
    cx.fillRect(bx, by, bw, bh+1);
    // Windows
    b.win.forEach(([wx,wy]) => {
      const wx2=bx+bw*wx, wy2=by+bh*wy;
      const ww=bw*0.18, wh=bh*0.12;
      const flicker = Math.random() > 0.998; // rare flicker
      const warmth = flicker ? 1 : 0.6+Math.sin(t*0.3+wx2)*0.4;
      cx.fillStyle=`rgba(255,200,80,${warmth*0.55})`;
      cx.fillRect(wx2-ww/2, wy2-wh/2, ww, wh);
    });
  });
}

function loop() {
  t += 0.016;
  drawBg();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
